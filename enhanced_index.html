<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 A股投资分析助手 - 增强版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .header h1 {
            color: #1a1a2e;
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header .subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        .header .ai-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background: #f0f0f0;
            color: #666;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .nav-tab:hover {
            background: #e0e0e0;
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .toolbar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex: 1;
            min-width: 300px;
        }

        input[type="text"], select, textarea {
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="text"] {
            flex: 1;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stock-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .stock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }

        .stock-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .stock-code {
            color: #999;
            font-size: 0.9rem;
        }

        .stock-sector {
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #666;
        }

        .stock-price {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a1a2e;
            margin: 15px 0;
        }

        .stock-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .metric {
            text-align: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .metric-label {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a1a2e;
        }

        .suggestion {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            margin: 15px 0;
        }

        .suggestion.ideal {
            background: #d4edda;
            color: #155724;
        }

        .suggestion.reasonable {
            background: #fff3cd;
            color: #856404;
        }

        .suggestion.cautious {
            background: #ffe5d0;
            color: #85351b;
        }

        .suggestion.wait {
            background: #f8d7da;
            color: #721c24;
        }

        .price-range {
            margin: 15px 0;
        }

        .price-range-title {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }

        .price-bars {
            display: flex;
            gap: 8px;
            height: 40px;
        }

        .price-bar {
            flex: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
        }

        .price-bar.ideal {
            background: #28a745;
        }

        .price-bar.reasonable {
            background: #ffc107;
            color: #333;
        }

        .price-bar.cautious {
            background: #fd7e14;
        }

        .price-bar.high {
            background: #dc3545;
        }

        .card-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .card-actions button {
            padding: 10px;
            font-size: 0.9rem;
        }

        .status-bar {
            background: white;
            border-radius: 12px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .status-info {
            color: #666;
            font-size: 0.95rem;
        }

        .status-info strong {
            color: #1a1a2e;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 25px 30px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .modal-close {
            background: #f0f0f0;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            padding: 30px;
        }

        .report-content {
            line-height: 1.8;
            color: #333;
        }

        .report-content h1, .report-content h2, .report-content h3 {
            color: #1a1a2e;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .report-content h1 { font-size: 1.8rem; }
        .report-content h2 { font-size: 1.4rem; }
        .report-content h3 { font-size: 1.2rem; }

        .report-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .report-content th, .report-content td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        .report-content th {
            background: #f8f9fa;
            font-weight: 600;
        }

        .news-form {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .form-group textarea {
            width: 100%;
            min-height: 150px;
            resize: vertical;
        }

        .comparison-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .stock-checkboxes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stock-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .stock-checkbox:hover {
            background: #e9ecef;
        }

        .stock-checkbox input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .reports-list {
            background: white;
            border-radius: 12px;
            padding: 25px;
        }

        .report-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            transition: all 0.3s;
        }

        .report-item:hover {
            background: #f8f9fa;
        }

        .report-item:last-child {
            border-bottom: none;
        }

        .report-info {
            flex: 1;
        }

        .report-name {
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 5px;
        }

        .report-meta {
            font-size: 0.85rem;
            color: #999;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .toast.error {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .toast.info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>
                📊 A股投资分析助手
                <span class="ai-badge">🤖 AI增强版</span>
            </h1>
            <p class="subtitle">实时行情 + AI深度分析 + 专业报告生成 | 阿里云百炼 qwen-plus</p>
            
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="portfolio">💼 投资组合</button>
                <button class="nav-tab" data-tab="news">📰 新闻分析</button>
                <button class="nav-tab" data-tab="comparison">⚖️ 股票对比</button>
                <button class="nav-tab" data-tab="reports">📄 报告中心</button>
            </div>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-info">
                <span id="stockCount">📊 0 只股票</span>
                <span style="margin-left: 20px;" id="lastUpdate">🔄 最后更新: --</span>
            </div>
            <div>
                <button class="btn-secondary" onclick="refreshData()">🔄 刷新数据</button>
            </div>
        </div>

        <!-- 投资组合页面 -->
        <div id="portfolio" class="content-section active">
            <!-- 添加股票工具栏 -->
            <div class="toolbar">
                <div class="input-group">
                    <input type="text" id="stockKeyword" placeholder="输入股票名称或代码（如：贵州茅台、600519）">
                    <select id="stockSector">
                        <option value="其他">📂 选择行业</option>
                        <option value="银行">🏦 银行</option>
                        <option value="白酒">🍷 白酒</option>
                        <option value="煤炭">⛏️ 煤炭</option>
                        <option value="电力">⚡ 电力</option>
                        <option value="石油">🛢️ 石油</option>
                        <option value="水务">💧 水务</option>
                        <option value="保险">🛡️ 保险</option>
                        <option value="证券">📈 证券</option>
                        <option value="其他">📦 其他</option>
                    </select>
                    <button class="btn-primary" onclick="addStock()">➕ 添加股票</button>
                </div>
                <button class="btn-success" onclick="generateMarketReport()">📊 生成市场日报</button>
            </div>

            <!-- 股票卡片 -->
            <div id="stockCards" class="cards-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </div>
        </div>

        <!-- 新闻分析页面 -->
        <div id="news" class="content-section">
            <div class="news-form">
                <h2>📰 新闻影响分析</h2>
                <p style="color: #666; margin-bottom: 20px;">输入新闻内容，AI将分析其对A股市场的影响</p>
                
                <div class="form-group">
                    <label>新闻标题</label>
                    <input type="text" id="newsTitle" placeholder="输入新闻标题">
                </div>
                
                <div class="form-group">
                    <label>新闻内容</label>
                    <textarea id="newsContent" placeholder="粘贴新闻内容..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>相关股票（可选，用逗号分隔）</label>
                    <input type="text" id="relatedStocks" placeholder="如：600519,600036">
                </div>
                
                <button class="btn-primary" onclick="analyzeNews()">🤖 AI分析新闻</button>
            </div>
            
            <div id="newsAnalysisResult" class="modal-content" style="display: none; margin-top: 20px;">
                <div class="modal-header">
                    <h3 class="modal-title">📊 新闻分析结果</h3>
                </div>
                <div class="modal-body">
                    <div id="newsAnalysisContent" class="report-content"></div>
                </div>
            </div>
        </div>

        <!-- 股票对比页面 -->
        <div id="comparison" class="content-section">
            <div class="comparison-section">
                <h2>⚖️ 股票对比分析</h2>
                <p style="color: #666; margin-bottom: 20px;">选择2只或更多股票进行对比分析</p>
                
                <div id="stockCheckboxes" class="stock-checkboxes">
                    <p style="color: #999;">请先在投资组合中添加股票...</p>
                </div>
                
                <div style="margin-top: 20px;">
                    <button class="btn-primary" onclick="generateComparisonReport()">📊 生成对比报告</button>
                </div>
            </div>
        </div>

        <!-- 报告中心页面 -->
        <div id="reports" class="content-section">
            <div class="reports-list">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>📄 报告中心</h2>
                    <button class="btn-secondary" onclick="loadReportsList()">🔄 刷新列表</button>
                </div>
                
                <div id="reportsList">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>加载报告列表...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">📊 分析报告</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div id="reportContent" class="report-content"></div>
            </div>
        </div>
    </div>

    <!-- Toast提示 -->
    <div id="toast" class="toast"></div>

    <script>
        let stocks = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadStocks();
            setupTabs();
        });

        // 设置标签页
        function setupTabs() {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
                    document.getElementById(tab.dataset.tab).classList.add('active');
                    
                    if (tab.dataset.tab === 'comparison') {
                        updateComparisonCheckboxes();
                    } else if (tab.dataset.tab === 'reports') {
                        loadReportsList();
                    }
                });
            });
        }

        // 显示Toast
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 加载股票数据
        async function loadStocks() {
            try {
                const response = await fetch('/api/get_stocks');
                const data = await response.json();
                
                if (data.success) {
                    stocks = data.stocks;
                    renderStocks();
                    updateStatus(data.count, data.updateTime);
                    updateComparisonCheckboxes();
                }
            } catch (error) {
                showToast('加载数据失败', 'error');
                console.error(error);
            }
        }

        // 渲染股票卡片
        function renderStocks() {
            const container = document.getElementById('stockCards');
            
            if (stocks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="icon">📭</div>
                        <h3>还没有股票</h3>
                        <p>在上方输入框添加股票开始分析</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = stocks.map(stock => {
                const price = parseFloat(stock.currentPrice) || 0;
                const ideal = parseFloat(stock.idealBuy) || 0;
                const reasonable = parseFloat(stock.reasonableBuy) || 0;
                const cautious = parseFloat(stock.cautiousBuy) || 0;
                
                let suggestionClass, suggestionText;
                if (price <= ideal) {
                    suggestionClass = 'ideal';
                    suggestionText = '🟢 理想买点 - 强烈关注';
                } else if (price <= reasonable) {
                    suggestionClass = 'reasonable';
                    suggestionText = '🟡 合理买点 - 适度关注';
                } else if (price <= cautious) {
                    suggestionClass = 'cautious';
                    suggestionText = '🟠 谨慎买点 - 轻仓试探';
                } else {
                    suggestionClass = 'wait';
                    suggestionText = '🔴 观望 - 等待更好时机';
                }
                
                return `
                    <div class="stock-card">
                        <div class="stock-header">
                            <div>
                                <div class="stock-name">${stock.name}</div>
                                <div class="stock-code">${stock.code}</div>
                            </div>
                            <div class="stock-sector">${stock.sector}</div>
                        </div>
                        
                        <div class="stock-price">${stock.currentPrice} 元</div>
                        
                        <div class="stock-metrics">
                            <div class="metric">
                                <div class="metric-label">PE(TTM)</div>
                                <div class="metric-value">${stock.pe} 倍</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">PB</div>
                                <div class="metric-value">${stock.pb} 倍</div>
                            </div>
                            <div class="metric">
                                <div class="metric-label">股息率</div>
                                <div class="metric-value">${stock.dividendYield}%</div>
                            </div>
                        </div>
                        
                        <div class="suggestion ${suggestionClass}">
                            ${suggestionText}
                        </div>
                        
                        <div class="price-range">
                            <div class="price-range-title">🎯 估值区间</div>
                            <div class="price-bars">
                                <div class="price-bar ideal">${ideal} 理想</div>
                                <div class="price-bar reasonable">${reasonable} 合理</div>
                                <div class="price-bar cautious">${cautious} 谨慎</div>
                            </div>
                        </div>
                        
                        <div class="card-actions">
                            <button class="btn-primary" onclick="aiAnalyzeStock('${stock.code}')">
                                🤖 AI分析
                            </button>
                            <button class="btn-success" onclick="generateStockReport('${stock.code}')">
                                📄 生成报告
                            </button>
                            <button class="btn-secondary" onclick="refreshStock('${stock.code}')">
                                🔄 刷新
                            </button>
                            <button class="btn-danger" onclick="deleteStock('${stock.code}')">
                                🗑️ 删除
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 更新状态
        function updateStatus(count, time) {
            document.getElementById('stockCount').textContent = `📊 ${count} 只股票`;
            document.getElementById('lastUpdate').textContent = `🔄 最后更新: ${time || '--'}`;
        }

        // 添加股票
        async function addStock() {
            const keyword = document.getElementById('stockKeyword').value.trim();
            const sector = document.getElementById('stockSector').value;
            
            if (!keyword) {
                showToast('请输入股票名称或代码', 'error');
                return;
            }
            
            showToast('正在添加...', 'info');
            
            try {
                const response = await fetch('/api/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword, sector })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(data.message, 'success');
                    document.getElementById('stockKeyword').value = '';
                    loadStocks();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('添加失败', 'error');
                console.error(error);
            }
        }

        // 删除股票
        async function deleteStock(code) {
            if (!confirm('确定要删除这只股票吗？')) return;
            
            try {
                const response = await fetch(`/api/delete/${code}`, { method: 'DELETE' });
                const data = await response.json();
                
                if (data.success) {
                    showToast('删除成功', 'success');
                    loadStocks();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('删除失败', 'error');
                console.error(error);
            }
        }

        // 刷新数据
        async function refreshData() {
            showToast('正在刷新...', 'info');
            
            try {
                const response = await fetch('/api/refresh');
                const data = await response.json();
                
                if (data.success) {
                    showToast('刷新成功', 'success');
                    loadStocks();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('刷新失败', 'error');
                console.error(error);
            }
        }

        // AI分析股票
        async function aiAnalyzeStock(code) {
            const stock = stocks.find(s => s.code === code);
            showToast('AI正在分析...', 'info');
            
            try {
                const response = await fetch(`/api/ai_analyze/${code}`);
                const data = await response.json();
                
                if (data.success) {
                    openModal(`🤖 ${stock.name} AI深度分析`, data.analysis);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('分析失败', 'error');
                console.error(error);
            }
        }

        // 生成股票报告
        async function generateStockReport(code) {
            const stock = stocks.find(s => s.code === code);
            showToast('正在生成报告...', 'info');
            
            try {
                const response = await fetch(`/api/generate_report/${code}?include_ai=true`);
                const data = await response.json();
                
                if (data.success) {
                    openModal(`📊 ${stock.name} 深度分析报告`, data.report);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('生成报告失败', 'error');
                console.error(error);
            }
        }

        // 生成市场日报
        async function generateMarketReport() {
            if (stocks.length === 0) {
                showToast('请先添加股票', 'error');
                return;
            }
            
            showToast('正在生成市场日报...', 'info');
            
            try {
                const response = await fetch('/api/generate_market_report?include_ai=true');
                const data = await response.json();
                
                if (data.success) {
                    openModal('📈 A股市场日报', data.report);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('生成报告失败', 'error');
                console.error(error);
            }
        }

        // 更新对比复选框
        function updateComparisonCheckboxes() {
            const container = document.getElementById('stockCheckboxes');
            
            if (stocks.length === 0) {
                container.innerHTML = '<p style="color: #999;">请先在投资组合中添加股票...</p>';
                return;
            }
            
            container.innerHTML = stocks.map(stock => `
                <label class="stock-checkbox">
                    <input type="checkbox" value="${stock.code}" class="comparison-checkbox">
                    <span>
                        <strong>${stock.name}</strong><br>
                        <small style="color: #999;">${stock.code} | ${stock.sector}</small>
                    </span>
                </label>
            `).join('');
        }

        // 生成对比报告
        async function generateComparisonReport() {
            const checkboxes = document.querySelectorAll('.comparison-checkbox:checked');
            const codes = Array.from(checkboxes).map(cb => cb.value);
            
            if (codes.length < 2) {
                showToast('请至少选择2只股票', 'error');
                return;
            }
            
            showToast('正在生成对比报告...', 'info');
            
            try {
                const response = await fetch('/api/generate_comparison', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ codes })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    openModal('⚖️ 股票对比分析报告', data.report);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('生成报告失败', 'error');
                console.error(error);
            }
        }

        // 分析新闻
        async function analyzeNews() {
            const title = document.getElementById('newsTitle').value.trim();
            const content = document.getElementById('newsContent').value.trim();
            const relatedStocksInput = document.getElementById('relatedStocks').value.trim();
            
            if (!title || !content) {
                showToast('请输入新闻标题和内容', 'error');
                return;
            }
            
            const relatedStocks = relatedStocksInput ? relatedStocksInput.split(',').map(s => s.trim()) : [];
            
            showToast('AI正在分析新闻...', 'info');
            
            try {
                const response = await fetch('/api/analyze_news', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content, relatedStocks })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('newsAnalysisContent').innerHTML = data.analysis;
                    document.getElementById('newsAnalysisResult').style.display = 'block';
                    showToast('分析完成', 'success');
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('分析失败', 'error');
                console.error(error);
            }
        }

        // 加载报告列表
        async function loadReportsList() {
            const container = document.getElementById('reportsList');
            
            try {
                const response = await fetch('/api/reports');
                const data = await response.json();
                
                if (data.success) {
                    if (data.reports.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <div class="icon">📭</div>
                                <h3>还没有报告</h3>
                                <p>在投资组合页面生成分析报告</p>
                            </div>
                        `;
                    } else {
                        container.innerHTML = data.reports.map(report => `
                            <div class="report-item">
                                <div class="report-info">
                                    <div class="report-name">📄 ${report.filename}</div>
                                    <div class="report-meta">
                                        创建时间: ${report.created} | 大小: ${(report.size / 1024).toFixed(1)} KB
                                    </div>
                                </div>
                                <button class="btn-primary" onclick="viewReport('${report.filename}')">👁 查看</button>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                showToast('加载报告列表失败', 'error');
                console.error(error);
            }
        }

        // 查看报告
        async function viewReport(filename) {
            try {
                const response = await fetch(`/api/reports/${filename}`);
                const data = await response.json();
                
                if (data.success) {
                    openModal(`📄 ${filename}`, data.content);
                } else {
                    showToast(data.message, 'error');
                }
            } catch (error) {
                showToast('加载报告失败', 'error');
                console.error(error);
            }
        }

        // 打开模态框
        function openModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            
            let htmlContent = content;
            if (!content.includes('<')) {
                htmlContent = markdownToHtml(content);
            }
            document.getElementById('reportContent').innerHTML = htmlContent;
            
            document.getElementById('reportModal').classList.add('active');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('reportModal').classList.remove('active');
        }

        // 简单的Markdown转HTML
        function markdownToHtml(text) {
            return text
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/\*\*(.*)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*)\*/g, '<em>$1</em>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>')
                .replace(/^-(.*$)/gm, '<li>$1</li>');
        }

        // 点击模态框背景关闭
        document.getElementById('reportModal').addEventListener('click', (e) => {
            if (e.target.id === 'reportModal') {
                closeModal();
            }
        });

        // 回车键添加股票
        document.getElementById('stockKeyword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addStock();
            }
        });
    </script>
</body>
</html>
